name: Build and deploy Blazor Web App to Azure Web App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore InstagramClone.Web.sln

      - name: Build Web
        run: dotnet build InstagramClone.Web.csproj --configuration Release --no-restore

      - name: Publish Web
        run: dotnet publish InstagramClone.Web.csproj --configuration Release --no-build -o "${{env.DOTNET_ROOT}}/webapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm
          path: ${{env.DOTNET_ROOT}}/webapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: blazor-wasm

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_WEB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_WEB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_WEB }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "InstagramCloneweb"
          slot-name: "Production"
          package: .
