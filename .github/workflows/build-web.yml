name: Build Web

on:
  push:
    branches: [main, master]
    paths:
      - "InstagramClone.Web/**"
      - "Assignment.sln"
      - "InstagramClone.Web/.github/workflows/build-web.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "InstagramClone.Web/**"
      - "Assignment.sln"
      - "InstagramClone.Web/.github/workflows/build-web.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Assignment.sln

      - name: Build Web
        run: dotnet build InstagramClone.Web/InstagramClone.Web.csproj --configuration Release --no-restore

      - name: Publish Web
        run: dotnet publish InstagramClone.Web/InstagramClone.Web.csproj --configuration Release --no-build -o publish/web

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm
          path: publish/web/wwwroot
